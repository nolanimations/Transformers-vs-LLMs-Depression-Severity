name: capstone

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - pip:
    # PyTorch with CUDA 12.4 — installed via the official PyTorch pip wheels.
    # This is the recommended approach on Windows; the conda pytorch channel
    # only ships CUDA 13.0 builds for pytorch 2.9+.
    - --extra-index-url https://download.pytorch.org/whl/cu124
    - torch>=2.9.0
    - torchvision
    - torchaudio

    - transformers>=5.5.0
    - datasets>=4.8.0
    - accelerate>=1.0.0

    - scikit-learn>=1.8.0
    - scipy>=1.15.0

    - shap>=0.51.0
    - krippendorff>=0.6.0

    - openai>=2.31.0
    - google-genai>=1.73.0

    - emoji>=2.15.0
    - nltk>=3.9.0

    - numpy>=2.4.0
    - pandas>=3.0.0

    - pyyaml>=6.0.0
    - python-dotenv>=1.0.0

    - matplotlib>=3.10.0
    - seaborn>=0.13.0

    - ipykernel>=6.0.0
    - tqdm>=4.67.0
